# dependabot.yml
#
# Documentation:
#   https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Dependabot for CI
  - package-ecosystem: github-actions
    directories:
      - "/"
      - "/otdfctl/e2e"
    schedule:
      interval: monthly
    commit-message:
      prefix: "chore(ci)"

  # Dependabot for internal deps
  # Add explicit entry as any go.mods need internal dep checks

  # examples + BDD tests grouped together
  - package-ecosystem: gomod
    directories:
      - "/examples"
      - "/tests-bdd"
    commit-message:
      prefix: "fix(deps)"
    groups:
      external:
        exclude-patterns:
          - "github.com/opentdf/*"
    schedule:
      interval: daily

  # lib/* modules grouped together
  - package-ecosystem: gomod
    directories:
      - "/lib/fixtures"
      - "/lib/flattening"
      - "/lib/identifier"
      - "/lib/ocrypto"
    commit-message:
      prefix: "fix(deps)"
    groups:
      external:
        exclude-patterns:
          - "github.com/opentdf/*"
    schedule:
      interval: daily

  - package-ecosystem: gomod
    directory: "/sdk"
    commit-message:
      prefix: "fix(deps)"
    groups:
      external:
        exclude-patterns:
          - "github.com/opentdf/*"
    schedule:
      interval: daily

  - package-ecosystem: gomod
    directory: "/service"
    commit-message:
      prefix: "fix(deps)"
    groups:
      external:
        exclude-patterns:
          - "github.com/opentdf/*"
    schedule:
      interval: daily

  - package-ecosystem: gomod
    directory: "/otdfctl"
    commit-message:
      prefix: "fix(deps)"
    groups:
      external:
        exclude-patterns:
          - "github.com/opentdf/*"
    schedule:
      interval: daily

  - package-ecosystem: gomod
    directory: "/protocol/go"
    commit-message:
      prefix: "fix(deps)"
    groups:
      external:
        exclude-patterns:
          - "github.com/opentdf/*"
    schedule:
      interval: daily
