name: "📜 Spec validation"

on:
  pull_request:
    branches:
      - main
    paths:
      - "spec/**"
      - ".github/workflows/spec-validation.yaml"
  push:
    branches:
      - main
    paths:
      - "spec/**"

permissions: {}

jobs:
  schema-lint:
    name: JSON Schema and vector validation
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
      - name: Install ajv-cli
        run: npm install --global ajv-cli@5
      - name: Lint schemas
        run: |
          ajv compile -s spec/schema/BaseTDF/kao.schema.json
          ajv compile -s spec/schema/BaseTDF/manifest.schema.json
          ajv compile -s spec/schema/BaseTDF/policy.schema.json
          ajv compile -s spec/testvectors/kao/vector.schema.json
      - name: Validate every test vector against vector.schema.json
        run: |
          shopt -s nullglob
          for f in spec/testvectors/kao/vectors/*.json; do
            ajv validate \
              -s spec/testvectors/kao/vector.schema.json \
              -d "$f" \
              --strict=false
          done

  python:
    name: "Python reference (conformance gate)"
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - name: Install
        working-directory: spec/tools/python
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Lint
        working-directory: spec/tools/python
        run: |
          ruff check src tests
          ruff format --check src tests
      - name: Type check
        working-directory: spec/tools/python
        run: mypy src
      - name: Pytest (conformance gate)
        working-directory: spec/tools/python
        run: pytest -v

  explorer:
    name: "Astro explorer build + parity tests"
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: spec/tools/explorer/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: spec/tools/explorer
        run: pnpm install --frozen-lockfile
      - name: Build static site
        working-directory: spec/tools/explorer
        run: pnpm build
      - name: Vitest parity suite
        working-directory: spec/tools/explorer
        run: pnpm test

  fixtures-fresh:
    name: "Test fixtures are reproducible"
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Install
        working-directory: spec/tools/python
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[pqc]'
      - name: Regenerate vectors into a temp dir
        run: |
          tmp=$(mktemp -d)
          cp -r spec/testvectors/kao/keys "$tmp/keys"
          cp spec/testvectors/kao/index.json "$tmp/index.json"
          cp spec/testvectors/kao/vector.schema.json "$tmp/vector.schema.json"
          python spec/tools/python/scripts/gen_test_vectors.py "$tmp"
          # Compare with checked-in vectors. ECDH ephemeral keys are
          # deterministic, ML-KEM uses fixed DRBG seeds, RSA-OAEP ciphertexts
          # are randomized (excluded from diff for now).
          diff_out=$(diff -r --brief spec/testvectors/kao/vectors "$tmp/vectors" \
            | grep -v -E '(pos-rsa-oaep-)' || true)
          if [ -n "$diff_out" ]; then
            echo "fixtures drifted:" >&2
            echo "$diff_out" >&2
            exit 1
          fi

  taxonomy-parity:
    name: "Error code parity (md ↔ Python ↔ TypeScript)"
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Compare error code lists
        run: python spec/tools/python/scripts/check_taxonomy_parity.py
