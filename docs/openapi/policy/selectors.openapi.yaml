    policy.PageRequest:
      type: object
      properties:
        limit:
          type: integer
          title: limit
          format: int32
          description: |-
            Optional
             Set to configured default limit if not provided
             Maximum limit set in platform config and enforced by services
        offset:
          type: integer
          title: offset
          format: int32
          description: |-
            Optional
             Defaulted if not provided
        sort:
          type: array
          items:
            $ref: '#/components/schemas/policy.SortField'
          title: sort
          maxItems: 1
          description: |-
            Deprecated: use resource-specific sort fields on each List*Request instead
             (e.g. AttributesSort, NamespacesSort). This generic field is unused and
             will be removed in a future version.
          deprecated: true
      title: PageRequest
      additionalProperties: false
    policy.PageResponse:
      type: object
      properties:
        currentOffset:
          type: integer
          title: current_offset
          format: int32
          description: Requested pagination offset
        nextOffset:
          type: integer
          title: next_offset
          format: int32
          description: |-
            Calculated with request limit + offset or defaults
             Empty when none remain after current page
        total:
          type: integer
          title: total
          format: int32
          description: Total count of entire list
      title: PageResponse
      additionalProperties: false
    policy.SortField:
      type: object
      properties:
        field:
          type: string
          title: field
          description: |-
            Field name to sort by (e.g. "name", "created_at", "updated_at")
             Valid values are resource-specific — validated at the service level
        direction:
          title: direction
          description: Sort direction; defaults to ASC when unspecified
          $ref: '#/components/schemas/policy.SortDirection'
      title: SortField
      additionalProperties: false
security: []
