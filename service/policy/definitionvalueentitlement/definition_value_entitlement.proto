syntax = "proto3";

package policy.definitionvalueentitlement;

import "buf/validate/validate.proto";
import "common/common.proto";
import "policy/objects.proto";
import "policy/selectors.proto";
import "policy/subjectmapping/subject_mapping.proto";

/*
   Definition Value Entitlement Mapping CRUD operations
*/

message GetDefinitionValueEntitlementMappingRequest {
  // Required
  string id = 1 [(buf.validate.field).string.uuid = true];
}
message GetDefinitionValueEntitlementMappingResponse {
  policy.DefinitionValueEntitlementMapping definition_value_entitlement_mapping = 1;
}

enum SortDefinitionValueEntitlementMappingsType {
  SORT_DEFINITION_VALUE_ENTITLEMENT_MAPPINGS_TYPE_UNSPECIFIED = 0;
  SORT_DEFINITION_VALUE_ENTITLEMENT_MAPPINGS_TYPE_CREATED_AT = 1;
  SORT_DEFINITION_VALUE_ENTITLEMENT_MAPPINGS_TYPE_UPDATED_AT = 2;
}

message DefinitionValueEntitlementMappingsSort {
  SortDefinitionValueEntitlementMappingsType field = 1 [(buf.validate.field).enum.defined_only = true];
  policy.SortDirection direction = 2 [(buf.validate.field).enum.defined_only = true];
}

message ListDefinitionValueEntitlementMappingsRequest {
  // Optional
  // Namespace ID or FQN, or Attribute Definition ID or FQN to filter by
  string namespace_id = 1 [(buf.validate.field).cel = {
    id: "optional_uuid_format"
    message: "Optional field must be a valid UUID"
    expression: "size(this) == 0 || this.matches('[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}')"
  }];
  string attribute_definition_id = 2 [(buf.validate.field).cel = {
    id: "optional_uuid_format"
    message: "Optional field must be a valid UUID"
    expression: "size(this) == 0 || this.matches('[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}')"
  }];

  // Optional
  policy.PageRequest pagination = 10;

  // Optional - CONSTRAINT: max 1 item
  repeated DefinitionValueEntitlementMappingsSort sort = 11 [(buf.validate.field).repeated.max_items = 1];
}
message ListDefinitionValueEntitlementMappingsResponse {
  repeated policy.DefinitionValueEntitlementMapping definition_value_entitlement_mappings = 1;

  policy.PageResponse pagination = 10;
}

message CreateDefinitionValueEntitlementMappingRequest {
  // Required: Attribute Definition ID or FQN to scope the mapping to
  option (buf.validate.message).oneof = {
    fields: ["attribute_definition_id", "attribute_definition_fqn"]
    required: true
  };
  string attribute_definition_id = 1 [(buf.validate.field).cel = {
    id: "optional_uuid_format"
    message: "Optional field must be a valid UUID"
    expression: "size(this) == 0 || this.matches('[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}')"
  }];
  string attribute_definition_fqn = 2 [
    (buf.validate.field).string = {
      min_len: 0
      uri: true
    }
  ];

  // Required: the dynamic resolver comparing entity selector result to the resource value segment
  policy.DefinitionValueResolver value_resolver = 3 [(buf.validate.field).required = true];

  // Required: actions permitted on a matched value
  repeated policy.Action actions = 4 [
    (buf.validate.field).repeated.min_items = 1,
    (buf.validate.field).cel = {
      id: "action_name_or_id_not_empty"
      message: "Action name or ID must not be empty if provided"
      expression: "this.all(item, item.name != '' || item.id != '')"
    }
  ];

  // Optional static pre-gate. Reuse an existing SubjectConditionSet (prioritized) ...
  string existing_subject_condition_set_id = 5 [(buf.validate.field).cel = {
    id: "optional_uuid_format"
    message: "Optional field must be a valid UUID"
    expression: "size(this) == 0 || this.matches('[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}')"
  }];
  // ... or create a new one (ignored if existing_subject_condition_set_id is provided)
  policy.subjectmapping.SubjectConditionSetCreate new_subject_condition_set = 6;

  // Optional: namespace ID or FQN for the mapping
  string namespace_id = 7 [(buf.validate.field).cel = {
    id: "optional_uuid_format"
    message: "Optional field must be a valid UUID"
    expression: "size(this) == 0 || this.matches('[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}')"
  }];
  string namespace_fqn = 8 [
    (buf.validate.field).string = {
      min_len: 0
      uri: true
    }
  ];

  // Optional
  common.MetadataMutable metadata = 100;
}
message CreateDefinitionValueEntitlementMappingResponse {
  policy.DefinitionValueEntitlementMapping definition_value_entitlement_mapping = 1;
}

message UpdateDefinitionValueEntitlementMappingRequest {
  // Required
  string id = 1 [(buf.validate.field).string.uuid = true];

  // Optional: replace the dynamic resolver
  policy.DefinitionValueResolver value_resolver = 2;

  // Optional: replace the static pre-gate SubjectConditionSet by id
  string subject_condition_set_id = 3 [(buf.validate.field).cel = {
    id: "optional_uuid_format"
    message: "Optional field must be a valid UUID"
    expression: "size(this) == 0 || this.matches('[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}')"
  }];

  // Optional: replace the entire list of actions
  repeated policy.Action actions = 4 [(buf.validate.field).cel = {
    id: "action_name_or_id_not_empty"
    message: "Action name or ID must not be empty if provided"
    expression: "this.size() == 0 || this.all(item, item.name != '' || item.id != '')"
  }];

  // Common metadata
  common.MetadataMutable metadata = 100;
  common.MetadataUpdateEnum metadata_update_behavior = 101;
}
message UpdateDefinitionValueEntitlementMappingResponse {
  policy.DefinitionValueEntitlementMapping definition_value_entitlement_mapping = 1;
}

message DeleteDefinitionValueEntitlementMappingRequest {
  // Required
  string id = 1 [(buf.validate.field).string.uuid = true];
}
message DeleteDefinitionValueEntitlementMappingResponse {
  // Only ID of the deleted mapping provided
  policy.DefinitionValueEntitlementMapping definition_value_entitlement_mapping = 1;
}

service DefinitionValueEntitlementMappingService {
  rpc ListDefinitionValueEntitlementMappings(ListDefinitionValueEntitlementMappingsRequest) returns (ListDefinitionValueEntitlementMappingsResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }
  rpc GetDefinitionValueEntitlementMapping(GetDefinitionValueEntitlementMappingRequest) returns (GetDefinitionValueEntitlementMappingResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }
  rpc CreateDefinitionValueEntitlementMapping(CreateDefinitionValueEntitlementMappingRequest) returns (CreateDefinitionValueEntitlementMappingResponse) {}
  rpc UpdateDefinitionValueEntitlementMapping(UpdateDefinitionValueEntitlementMappingRequest) returns (UpdateDefinitionValueEntitlementMappingResponse) {}
  rpc DeleteDefinitionValueEntitlementMapping(DeleteDefinitionValueEntitlementMappingRequest) returns (DeleteDefinitionValueEntitlementMappingResponse) {}
}
