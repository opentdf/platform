##
# Default BDD policy fixture.
#
# Loaded by `a default local platform` (see tests-bdd/README.md). Provisions
# a minimal, demo-friendly ABAC policy under the `demo.com` namespace that
# the encrypt/decrypt feature file leans on:
#
#   demo.com/attr/department        rule: ANY_OF
#     - engineering, finance, hr
#
#   demo.com/attr/classification    rule: HIERARCHY  (listed high -> low)
#     - secret, confidential, internal, public
#
# Subject mappings key off Keycloak user attribute claims:
#   .attributes.department[]       -> department attribute values
#   .attributes.classification[]   -> classification attribute values
# Each mapping grants the `read` action (the action KAS evaluates during
# rewrap — see service/kas/access/accessPdp.go).
#
# KAS registry + attribute-value-to-key bindings are NOT in this fixture:
# they depend on per-scenario generated key material and are provisioned
# via the SDK in steps_localplatform.go after the platform is healthy.
#
# Schema mirrors service/internal/fixtures/policy_fixtures.yaml.
##

attribute_namespaces:
  metadata:
    table_name: attribute_namespaces
    columns:
      - id
      - name
      - active
  data:
    demo.com:
      id: a1b2c3d4-e5f6-4a7b-8c9d-000000000001
      name: demo.com
      active: true

attributes:
  metadata:
    table_name: attribute_definitions
    columns:
      - id
      - namespace_id
      - name
      - rule
      - active
  data:
    demo.com/attr/department:
      id: a1b2c3d4-e5f6-4a7b-8c9d-000000000010
      namespace_id: a1b2c3d4-e5f6-4a7b-8c9d-000000000001
      name: department
      rule: ANY_OF
      active: true
    demo.com/attr/classification:
      id: a1b2c3d4-e5f6-4a7b-8c9d-000000000020
      namespace_id: a1b2c3d4-e5f6-4a7b-8c9d-000000000001
      name: classification
      rule: HIERARCHY
      active: true
      # Explicit HIERARCHY rank order, high -> low. The fixtures loader
      # applies this as an UPDATE on attribute_definitions.values_order
      # after values are provisioned, so scenarios 3-5 in
      # encrypt-decrypt.feature get deterministic ranking regardless of
      # map iteration order.
      values_order:
        - a1b2c3d4-e5f6-4a7b-8c9d-000000000024 # secret
        - a1b2c3d4-e5f6-4a7b-8c9d-000000000023 # confidential
        - a1b2c3d4-e5f6-4a7b-8c9d-000000000022 # internal
        - a1b2c3d4-e5f6-4a7b-8c9d-000000000021 # public

##
# Attribute values. HIERARCHY rank is pinned by values_order on the
# classification attribute above, so the map keys here can be plain FQNs.
##
attribute_values:
  metadata:
    table_name: attribute_values
    columns:
      - id
      - attribute_definition_id
      - value
      - active
  data:
    demo.com/attr/department/value/engineering:
      id: a1b2c3d4-e5f6-4a7b-8c9d-000000000011
      attribute_definition_id: a1b2c3d4-e5f6-4a7b-8c9d-000000000010
      value: engineering
      active: true
    demo.com/attr/department/value/finance:
      id: a1b2c3d4-e5f6-4a7b-8c9d-000000000012
      attribute_definition_id: a1b2c3d4-e5f6-4a7b-8c9d-000000000010
      value: finance
      active: true
    demo.com/attr/department/value/hr:
      id: a1b2c3d4-e5f6-4a7b-8c9d-000000000013
      attribute_definition_id: a1b2c3d4-e5f6-4a7b-8c9d-000000000010
      value: hr
      active: true

    demo.com/attr/classification/value/secret:
      id: a1b2c3d4-e5f6-4a7b-8c9d-000000000024
      attribute_definition_id: a1b2c3d4-e5f6-4a7b-8c9d-000000000020
      value: secret
      active: true
    demo.com/attr/classification/value/confidential:
      id: a1b2c3d4-e5f6-4a7b-8c9d-000000000023
      attribute_definition_id: a1b2c3d4-e5f6-4a7b-8c9d-000000000020
      value: confidential
      active: true
    demo.com/attr/classification/value/internal:
      id: a1b2c3d4-e5f6-4a7b-8c9d-000000000022
      attribute_definition_id: a1b2c3d4-e5f6-4a7b-8c9d-000000000020
      value: internal
      active: true
    demo.com/attr/classification/value/public:
      id: a1b2c3d4-e5f6-4a7b-8c9d-000000000021
      attribute_definition_id: a1b2c3d4-e5f6-4a7b-8c9d-000000000020
      value: public
      active: true

##
# Subject Condition Sets — one per attribute value. Each SCS matches
# exactly the claim value for that attribute value.
##
subject_condition_set:
  metadata:
    table_name: subject_condition_set
    columns:
      - id
      - condition
  data:
    scs_department_engineering:
      id: b1b2c3d4-e5f6-4a7b-8c9d-000000000011
      condition:
        subjectSets:
          - conditionGroups:
              - booleanOperator: CONDITION_BOOLEAN_TYPE_ENUM_AND
                conditions:
                  - subjectExternalSelectorValue: ".attributes.department[]"
                    operator: SUBJECT_MAPPING_OPERATOR_ENUM_IN
                    subjectExternalValues:
                      - engineering
    scs_department_finance:
