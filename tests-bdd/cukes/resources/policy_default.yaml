##
# Default BDD policy fixture.
#
# Loaded by `a default local platform` (see tests-bdd/README.md). Provisions
# a minimal, demo-friendly ABAC policy under the `demo.com` namespace that
# the encrypt/decrypt feature file leans on:
#
#   demo.com/attr/department        rule: ANY_OF
#     - engineering, finance, hr
#
#   demo.com/attr/classification    rule: HIERARCHY  (high -> low)
#     - secret, confidential, internal, public
#
# Subject mappings key off Keycloak user attribute claims:
#   .attributes.department[]       -> department attribute values
#   .attributes.classification[]   -> classification attribute values
# Each mapping grants the `read` action (the action KAS evaluates during
# rewrap — see service/kas/access/accessPdp.go).
#
# Some sections (kas_registry, kas_registry_keys, custom_actions,
# resource_mapping_groups, resource_mappings, registered_resources, etc.)
# are populated with stub rows so the canonical fixtures provisioner —
# which expects every section to have at least one entry — runs cleanly.
# Stub rows use IDs prefixed `fX...` and are not exercised by any test.
#
# HIERARCHY rank for classification is pinned post-load by an UPDATE on
# attribute_definitions.values_order in steps_localplatform.go (the
# fixtures loader cannot guarantee deterministic insertion order).
#
# Schema mirrors service/internal/fixtures/policy_fixtures.yaml.
##

attribute_namespaces:
  metadata:
    table_name: attribute_namespaces
    columns:
      - id
      - name
      - active
  data:
    demo.com:
      id: a1b2c3d4-e5f6-4a7b-8c9d-000000000001
      name: demo.com
      active: true

attributes:
  metadata:
    table_name: attribute_definitions
    columns:
      - id
      - namespace_id
      - name
      - rule
      - active
  data:
    demo.com/attr/department:
      id: a1b2c3d4-e5f6-4a7b-8c9d-000000000010
      namespace_id: a1b2c3d4-e5f6-4a7b-8c9d-000000000001
      name: department
      rule: ANY_OF
      active: true
    demo.com/attr/classification:
      id: a1b2c3d4-e5f6-4a7b-8c9d-000000000020
      namespace_id: a1b2c3d4-e5f6-4a7b-8c9d-000000000001
      name: classification
      rule: HIERARCHY
      active: true
    # Stub attribute carrying the stub KAS grants below. Not used by any
    # test scenario; exists solely so the loader's slice-based KAS-grant
    # provisioners have at least one row to insert without polluting the
    # real `department`/`classification` attributes' grant resolution.
    demo.com/attr/_bdd_stub:
      id: a1b2c3d4-e5f6-4a7b-8c9d-000000000030
      namespace_id: a1b2c3d4-e5f6-4a7b-8c9d-000000000001
      name: _bdd_stub
      rule: ANY_OF
      active: true

##
# Attribute values. HIERARCHY rank is pinned post-fixture-load by
# steps_localplatform.go (UPDATE attribute_definitions.values_order),
# since fixture map iteration order is non-deterministic.
##
attribute_values:
  metadata:
    table_name: attribute_values
    columns:
      - id
      - attribute_definition_id
      - value
      - active
  data:
    demo.com/attr/department/value/engineering:
      id: a1b2c3d4-e5f6-4a7b-8c9d-000000000011
